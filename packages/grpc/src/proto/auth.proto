syntax = "proto3";

package auth;

// Auth service gRPC definition
service AuthService {
  // Validate an access token — used by API Gateway and other services
  rpc ValidateToken(ValidateTokenRequest) returns (ValidateTokenResponse);

  // Get user info from a token (lightweight)
  rpc GetTokenUser(GetTokenUserRequest) returns (GetTokenUserResponse);

  // User registration
  rpc Register(RegisterRequest) returns (TokenResponse);

  // User login
  rpc Login(LoginRequest) returns (TokenResponse);

  // Refresh access token
  rpc Refresh(RefreshRequest) returns (TokenResponse);

  // Logout (invalidate token)
  rpc Logout(LogoutRequest) returns (LogoutResponse);
}

message ValidateTokenRequest {
  string access_token = 1;
}

message ValidateTokenResponse {
  bool valid = 1;
  string user_id = 2;
  string email = 3;
  string role = 4;
}

message GetTokenUserRequest {
  string access_token = 1;
}

message GetTokenUserResponse {
  string user_id = 1;
  string email = 2;
  string name = 3;
  string role = 4;
}

message RegisterRequest {
  string email = 1;
  string password = 2;
  string name = 3;
}

message LoginRequest {
  string email = 1;
  string password = 2;
}

message RefreshRequest {
  string refresh_token = 1;
}

message LogoutRequest {
  string access_token = 1;
}

message TokenResponse {
  string access_token = 1;
  string refresh_token = 2;
  UserInfo user = 3;
}

message UserInfo {
  string id = 1;
  string email = 2;
  string name = 3;
  string role = 4;
}

message LogoutResponse {
  string message = 1;
}
