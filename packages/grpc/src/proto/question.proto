syntax = "proto3";

package question;

service QuestionService {
  rpc GetQuestion(GetQuestionRequest) returns (QuestionResponse);
  rpc GetQuestions(GetQuestionsRequest) returns (PaginatedQuestionResponse);
  rpc GetRandomQuestions(GetRandomQuestionsRequest) returns (QuestionListResponse);
  rpc GetCategories(EmptyRequest) returns (StringListResponse);
  rpc GetTags(EmptyRequest) returns (StringListResponse);
  rpc CreateQuestion(CreateQuestionRequest) returns (QuestionResponse);
  rpc GenerateQuestions(GenerateQuestionsRequest) returns (QuestionListResponse);
  rpc UpdateQuestion(UpdateQuestionRequest) returns (QuestionResponse);
  rpc DeleteQuestion(DeleteQuestionRequest) returns (EmptyResponse);
  rpc GetPopularQuestions(GetPopularQuestionsRequest) returns (QuestionListResponse);
  rpc GetCommunityQuestions(GetCommunityQuestionsRequest) returns (PaginatedQuestionResponse);
  rpc SubmitCommunityQuestion(SubmitCommunityQuestionRequest) returns (QuestionResponse);
  rpc UpvoteQuestion(UpvoteQuestionRequest) returns (UpvoteQuestionResponse);
}

message EmptyRequest {}
message EmptyResponse {}

message GetQuestionRequest {
  string question_id = 1;
}

message GetQuestionsRequest {
  optional string type = 1;
  optional string difficulty = 2;
  optional string category = 3;
  int32 page = 4;
  int32 limit = 5;
}

message GetRandomQuestionsRequest {
  int32 count = 1;
  optional string type = 2;
  optional string difficulty = 3;
  optional string category = 4;
  optional string tags = 5;
  repeated string exclude_ids = 6;
}

message CreateQuestionRequest {
  string title = 1;
  string content = 2;
  string type = 3;
  string difficulty = 4;
  string category = 5;
  optional string hints = 6;
  optional string sample_answer = 7;
  repeated string tags = 8;
  optional string created_by = 9;
}

message GenerateQuestionsRequest {
  string field = 1;
  repeated string tech_stack = 2;
  string difficulty = 3;
  int32 count = 4;
}

message UpdateQuestionRequest {
  string question_id = 1;
  optional string title = 2;
  optional string content = 3;
  optional string type = 4;
  optional string difficulty = 5;
  optional string category = 6;
  optional string hints = 7;
  optional string sample_answer = 8;
  repeated string tags = 9;
}

message DeleteQuestionRequest {
  string question_id = 1;
}

message GetPopularQuestionsRequest {
  int32 limit = 1;
  optional string category = 2;
  optional string difficulty = 3;
}

message GetCommunityQuestionsRequest {
  int32 page = 1;
  int32 limit = 2;
  optional string category = 3;
  optional string difficulty = 4;
  optional string company_tag = 5;
  optional string sort_by = 6;
}

message SubmitCommunityQuestionRequest {
  string title = 1;
  string content = 2;
  string type = 3;
  string difficulty = 4;
  string category = 5;
  string company_tag = 6;
  repeated string tags = 7;
  string submitted_by = 8;
  string submitter_name = 9;
  optional string hints = 10;
  optional string sample_answer = 11;
}

message UpvoteQuestionRequest {
  string question_id = 1;
  string user_id = 2;
}

message UpvoteQuestionResponse {
  string question_id = 1;
  int32 upvote_count = 2;
  bool upvoted = 3;
}

message QuestionResponse {
  string id = 1;
  string title = 2;
  string content = 3;
  string hints = 4;
  string sample_answer = 5;
  string type = 6;
  string difficulty = 7;
  string category = 8;
  repeated string tags = 9;
  repeated McqOptionResponse mcq_options = 10;
  int32 usage_count = 11;
  string company_tag = 12;
  int32 upvote_count = 13;
  string created_by = 14;
  string submitter_name = 15;
  string created_at = 16;
}

message McqOptionResponse {
  string text = 1;
  bool is_correct = 2;
}

message QuestionListResponse {
  repeated QuestionResponse questions = 1;
}

message PaginatedQuestionResponse {
  repeated QuestionResponse questions = 1;
  int32 total = 2;
  int32 page = 3;
  int32 total_pages = 4;
}

message StringListResponse {
  repeated string items = 1;
}
